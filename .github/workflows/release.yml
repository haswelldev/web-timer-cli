name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${GITHUB_SHA::7}"
          mkdir -p dist
          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              EXT=""
              [ "$GOOS" = "windows" ] && EXT=".exe"
              OUTPUT="dist/web-timer-cli-${GOOS}-${GOARCH}${EXT}"
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w -X main.version=${VERSION}" -o "$OUTPUT" .
              echo "Built $OUTPUT"
            done
          done

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_SHA::7}"
          gh release create latest dist/* \
            --title "Latest build (${VERSION})" \
            --notes "Automated build from commit ${GITHUB_SHA}" \
            --prerelease
